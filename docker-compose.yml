name: cubic3-data-platform

services:
  # ============================================
  # Nginx 反向代理 + 静态文件服务
  # ============================================
  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    image: cubic3-data-platform-nginx
    container_name: cubic3-data-platform-nginx
    ports:
      - "81:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - cubic3_data_platform_network
    restart: unless-stopped

  # ============================================
  # 后端：Flask API
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cubic3-data-platform-backend
    entrypoint: ["./entrypoint.sh"]
    expose:
      - "5000"
    volumes:
      - ./instance:/app/instance
      - ./app:/app/app
      - ./wsgi.py:/app/wsgi.py:ro
      # 只注入 Codex CLI 登录态文件，避免把 ~/.codex/worktrees 和缓存暴露给 Docker Desktop 文件共享。
      - ${AGENT_CODEX_AUTH_FILE:-${HOME}/.codex/auth.json}:/root/.codex/auth.json:rw
    environment:
      # 本地 compose 固定使用内置 PostgreSQL，避免宿主机 DATABASE_URL 污染容器。
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cubic3_data_platform
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
      # 与 MaxCompute +08 业务日历对齐：编译器默认分区窗口 date.today() 按 +08 计算（Phase 10）
      - TZ=${TZ:-Asia/Shanghai}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_ADMIN_OPEN_IDS=${FEISHU_ADMIN_OPEN_IDS}
      - FEISHU_M2_READER_OPEN_IDS=${FEISHU_M2_READER_OPEN_IDS}
      - FEISHU_M2_READER_SYNC_CUBIC3_ALLOWLIST=${FEISHU_M2_READER_SYNC_CUBIC3_ALLOWLIST:-true}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
      - SUPERSET_BASE_URL=${SUPERSET_BASE_URL}
      - SUPERSET_USERNAME=${SUPERSET_USERNAME}
      - SUPERSET_PASSWORD=${SUPERSET_PASSWORD}
      - SUPERSET_JWT=${SUPERSET_JWT}
      - SUPERSET_TIMEOUT=${SUPERSET_TIMEOUT:-20}
      - SUPERSET_RETRY_MAX=${SUPERSET_RETRY_MAX:-3}
      - SUPERSET_RETRY_BACKOFF=${SUPERSET_RETRY_BACKOFF:-1.5}
      - SUPERSET_SCREENSHOT_MAX_WAIT=${SUPERSET_SCREENSHOT_MAX_WAIT:-60}
      - SUPERSET_SCREENSHOT_POLL_INTERVAL=${SUPERSET_SCREENSHOT_POLL_INTERVAL:-3}
      - SUPERSET_DASHBOARD_URL_TEMPLATE=${SUPERSET_DASHBOARD_URL_TEMPLATE}
      - SUPERSET_VIEWPORT_WIDTH=${SUPERSET_VIEWPORT_WIDTH:-1920}
      - SUPERSET_VIEWPORT_HEIGHT=${SUPERSET_VIEWPORT_HEIGHT:-1080}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:81}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      # AI provider 密钥加密存储（配置中心 UI 直填 API Key）；留空则 UI 填 Key 不可加密保存，回退 LLM_API_KEY
      - AI_SECRET_KEY=${AI_SECRET_KEY:-}
      # 全局问 LLM 意图抽取开关（默认关，需真实 LLM 验证后再开）
      - SEMANTIC_ROUTER_LLM_INTENT_ENABLED=${SEMANTIC_ROUTER_LLM_INTENT_ENABLED:-false}
      - QUERY_GATEWAY_BASE_URL=${QUERY_GATEWAY_BASE_URL:-http://dw-query-gateway:8000}
      - QUERY_GATEWAY_PLATFORM_SERVICE_TOKEN=${QUERY_GATEWAY_PLATFORM_SERVICE_TOKEN}
      - QUERY_GATEWAY_TIMEOUT_SECONDS=${QUERY_GATEWAY_TIMEOUT_SECONDS:-5}
      - QUERY_GATEWAY_SQL_DRY_RUN_PATH=${QUERY_GATEWAY_SQL_DRY_RUN_PATH:-/api/v1/queries/dry-run}
      - AGENT_CODEX_ENABLED=${AGENT_CODEX_ENABLED:-false}
      - AGENT_CODEX_UI_MANAGED=${AGENT_CODEX_UI_MANAGED:-false}
      - AGENT_CODEX_PROJECT_ID=${AGENT_CODEX_PROJECT_ID:-cubic3-data-platform}
      - AGENT_CODEX_PROJECT_ROOT=${AGENT_CODEX_PROJECT_ROOT:-/app}
      - AGENT_CODEX_RUNTIME_ROOT=${AGENT_CODEX_RUNTIME_ROOT:-.cubic3/agent-codex}
      - AGENT_CODEX_SANDBOX=${AGENT_CODEX_SANDBOX:-read-only}
      - AGENT_CODEX_PATH=${AGENT_CODEX_PATH:-}
      - AGENT_CODEX_BASE_URL=${AGENT_CODEX_BASE_URL:-}
      - AGENT_CODEX_TIMEOUT_SECONDS=${AGENT_CODEX_TIMEOUT_SECONDS:-10}
      - AGENT_CODEX_MAX_CONCURRENCY=${AGENT_CODEX_MAX_CONCURRENCY:-2}
      - SEMANTIC_MODELING_COPILOT_STORE=${SEMANTIC_MODELING_COPILOT_STORE:-sql}
      - GUNICORN_WORKERS=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cubic3_data_platform_network
    restart: unless-stopped

  # ============================================
  # RQ Worker（异步任务处理）
  # ============================================
  rq_worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: ["python", "/app/run_worker.py"]
    volumes:
      - ./instance:/app/instance
      - ./app:/app/app
      - ./run_worker.py:/app/run_worker.py:ro
      # 只注入 Codex CLI 登录态文件，避免把 ~/.codex/worktrees 和缓存暴露给 Docker Desktop 文件共享。
      - ${AGENT_CODEX_AUTH_FILE:-${HOME}/.codex/auth.json}:/root/.codex/auth.json:rw
    environment:
      # 本地 compose 固定使用内置 PostgreSQL，避免宿主机 DATABASE_URL 污染容器。
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cubic3_data_platform
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - TZ=${TZ:-Asia/Shanghai}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_ADMIN_OPEN_IDS=${FEISHU_ADMIN_OPEN_IDS}
      - FEISHU_M2_READER_OPEN_IDS=${FEISHU_M2_READER_OPEN_IDS}
      - FEISHU_M2_READER_SYNC_CUBIC3_ALLOWLIST=${FEISHU_M2_READER_SYNC_CUBIC3_ALLOWLIST:-true}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - SUPERSET_BASE_URL=${SUPERSET_BASE_URL}
      - SUPERSET_USERNAME=${SUPERSET_USERNAME}
      - SUPERSET_PASSWORD=${SUPERSET_PASSWORD}
      - SUPERSET_JWT=${SUPERSET_JWT}
      - SUPERSET_TIMEOUT=${SUPERSET_TIMEOUT:-20}
      - SUPERSET_RETRY_MAX=${SUPERSET_RETRY_MAX:-3}
      - SUPERSET_RETRY_BACKOFF=${SUPERSET_RETRY_BACKOFF:-1.5}
      - SUPERSET_SCREENSHOT_MAX_WAIT=${SUPERSET_SCREENSHOT_MAX_WAIT:-60}
      - SUPERSET_SCREENSHOT_POLL_INTERVAL=${SUPERSET_SCREENSHOT_POLL_INTERVAL:-3}
      - SUPERSET_DASHBOARD_URL_TEMPLATE=${SUPERSET_DASHBOARD_URL_TEMPLATE}
      - SUPERSET_VIEWPORT_WIDTH=${SUPERSET_VIEWPORT_WIDTH:-1920}
      - SUPERSET_VIEWPORT_HEIGHT=${SUPERSET_VIEWPORT_HEIGHT:-1080}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:81}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      # AI provider 密钥加密存储（配置中心 UI 直填 API Key）；留空则 UI 填 Key 不可加密保存，回退 LLM_API_KEY
      - AI_SECRET_KEY=${AI_SECRET_KEY:-}
      # 全局问 LLM 意图抽取开关（默认关，需真实 LLM 验证后再开）
      - SEMANTIC_ROUTER_LLM_INTENT_ENABLED=${SEMANTIC_ROUTER_LLM_INTENT_ENABLED:-false}
      - QUERY_GATEWAY_BASE_URL=${QUERY_GATEWAY_BASE_URL:-http://dw-query-gateway:8000}
      - QUERY_GATEWAY_PLATFORM_SERVICE_TOKEN=${QUERY_GATEWAY_PLATFORM_SERVICE_TOKEN}
      - QUERY_GATEWAY_TIMEOUT_SECONDS=${QUERY_GATEWAY_TIMEOUT_SECONDS:-5}
      - QUERY_GATEWAY_SQL_DRY_RUN_PATH=${QUERY_GATEWAY_SQL_DRY_RUN_PATH:-/api/v1/queries/dry-run}
      - AGENT_CODEX_ENABLED=${AGENT_CODEX_ENABLED:-false}
      - AGENT_CODEX_UI_MANAGED=${AGENT_CODEX_UI_MANAGED:-false}
      - AGENT_CODEX_PROJECT_ID=${AGENT_CODEX_PROJECT_ID:-cubic3-data-platform}
      - AGENT_CODEX_PROJECT_ROOT=${AGENT_CODEX_PROJECT_ROOT:-/app}
      - AGENT_CODEX_RUNTIME_ROOT=${AGENT_CODEX_RUNTIME_ROOT:-.cubic3/agent-codex}
      - AGENT_CODEX_SANDBOX=${AGENT_CODEX_SANDBOX:-read-only}
      - AGENT_CODEX_PATH=${AGENT_CODEX_PATH:-}
      - AGENT_CODEX_BASE_URL=${AGENT_CODEX_BASE_URL:-}
      - AGENT_CODEX_TIMEOUT_SECONDS=${AGENT_CODEX_TIMEOUT_SECONDS:-10}
      - AGENT_CODEX_MAX_CONCURRENCY=${AGENT_CODEX_MAX_CONCURRENCY:-2}
      - SEMANTIC_MODELING_COPILOT_STORE=${SEMANTIC_MODELING_COPILOT_STORE:-sql}
    depends_on:
      - redis
      - postgres
      - backend
    networks:
      - cubic3_data_platform_network
    deploy:
      replicas: 2
    restart: unless-stopped

  # ============================================
  # Redis（缓存 + 任务队列）
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: cubic3-data-platform-redis
    command: redis-server --appendonly yes
    volumes:
      - cubic3_data_platform_redis_data:/data
    expose:
      - "6379"
    networks:
      - cubic3_data_platform_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ============================================
  # PostgreSQL（主数据库）- 可选
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: cubic3-data-platform-postgres
    environment:
      - POSTGRES_DB=cubic3_data_platform
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - cubic3_data_platform_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - cubic3_data_platform_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ============================================
# 网络
# ============================================
networks:
  cubic3_data_platform_network:
    name: cubic3-data-platform-network
    driver: bridge

# ============================================
# 数据持久化
# ============================================
volumes:
  cubic3_data_platform_postgres_data:
    name: cubic3-data-platform-postgres-data
    driver: local
  cubic3_data_platform_redis_data:
    name: cubic3-data-platform-redis-data
    driver: local
