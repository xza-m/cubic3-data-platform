# cube 唯一标识（snake_case）
name: answer_records

# 人类可读名称（中文）
title: 学生答题记录

# 业务描述
description: |
  学生首次答题记录事实表，观察学生答题情况的核心依据。
  answer_date 为答题提交日期，未完成答题归档在 99991231 分区。

# 物理表名
table: dwd_study_first_answer_records_snap_di

# 数据源标识（可选，默认 maxcompute）
data_source: maxcompute    # maxcompute | clickhouse | postgresql | mysql

# 分区策略
partition:
  field: answer_date          # 分区字段名
  type: date                  # date | string
  format: "yyyyMMdd"         # 日期格式（MaxCompute 分区格式）
  max_range_days: 90          # 最大查询范围（天）
  latest_expr: null           # 无 MAX_PT，按日期范围查

# 默认过滤（每次查询自动注入）
default_filters:
  - sql: "answer_result IN (1, 2)"
    description: "仅统计已判题（正确或错误）"

# ============ 维度 ============
dimensions:
  answer_record_id:
    title: 答题记录ID
    type: string
    sql: "{CUBE}.answer_record_id"
    primary_key: true

  student_id:
    title: 学生ID
    type: string
    sql: "{CUBE}.student_id"
    foreign_key:
      cube: student
      field: user_id

  question_id:
    title: 题目ID
    type: string
    sql: "{CUBE}.question_id"
    foreign_key:
      cube: question
      field: question_id

  knowledge_id:
    title: 知识点ID
    type: string
    sql: "{CUBE}.knowledge_id"

  knowledge_name:
    title: 知识点名称
    type: string
    sql: "{CUBE}.knowledge_name"

  subject_id:
    title: 学科ID
    type: string
    sql: "{CUBE}.subject_id"

  subject_name:
    title: 学科名称
    type: string
    sql: "{CUBE}.subject_name"

  study_type_name:
    title: 学习类型
    type: string
    sql: "{CUBE}.study_type_name"

  answer_result:
    title: 答题结果
    type: number
    sql: "{CUBE}.answer_result"
    enum_source:                     # 从字典表动态加载
      type: meta_dict
      dict_type: "answer_result"

  question_difficulty:
    title: 题目难度
    type: number
    sql: "{CUBE}.question_difficulty"
    enum:                            # 不在字典表中，静态定义
      1: 较简单
      2: 简单
      3: 中等
      4: 较难
      5: 困难

  answer_date:
    title: 答题日期
    type: time
    sql: "{CUBE}.answer_date"

  answer_time:
    title: 答题时间
    type: time
    sql: "{CUBE}.answer_time"

  answer_duration:
    title: 答题耗时(ms)
    type: number
    sql: "{CUBE}.answer_duration"

  study_session_id:
    title: 学习会话ID
    type: string
    sql: "{CUBE}.study_session_id"
    foreign_key:
      cube: study_sessions
      field: study_session_id

  recommend_id:
    title: 推题策略ID
    type: string
    sql: "{CUBE}.recommend_id"
    foreign_key:
      cube: kt_recommend
      field: recommend_id

# ============ 指标 ============
measures:
  total_count:
    title: 答题总数
    type: count
    sql: "{CUBE}.answer_record_id"
    description: 统计已判题答题记录数量。
    certified: true

  correct_count:
    title: 正确题数
    type: sum
    sql: "CASE WHEN {CUBE}.answer_result = 1 THEN 1 ELSE 0 END"
    description: 统计答题结果为正确的题目数量。

  wrong_count:
    title: 错误题数
    type: sum
    sql: "CASE WHEN {CUBE}.answer_result = 2 THEN 1 ELSE 0 END"
    description: 统计答题结果为错误的题目数量。

  accuracy:
    title: 正确率
    type: number
    sql: "ROUND({correct_count} * 100.0 / NULLIF({total_count}, 0), 2)"
    description: "正确题数 / 总答题数 × 100%"
    format: percent
    certified: true

  student_count:
    title: 去重学生数
    type: count_distinct
    sql: "{CUBE}.student_id"
    description: 参与答题的去重学生数量。

  avg_duration:
    title: 平均答题耗时(ms)
    type: avg
    sql: "{CUBE}.answer_duration"
    description: 平均每次答题耗时，单位毫秒。

# ============ 分段 ============
segments:
  only_correct_wrong:
    title: 仅已判题
    sql: "{CUBE}.answer_result IN (1, 2)"

  system_evaluation:
    title: 仅系统判题
    sql: "{CUBE}.evaluation_type = 1"

# ============ 关联 ============
joins:
  student:
    cube: student
    type: left
    relationship: "N:1"            # 多条答题记录 → 一个学生（安全 JOIN）
    sql: "{CUBE}.student_id = {student}.user_id"

  question:
    cube: question
    type: left
    relationship: "N:1"
    sql: "{CUBE}.question_id = {question}.question_id"

  knowledge:
    cube: knowledge
    type: left
    relationship: "N:1"
    sql: "{CUBE}.knowledge_id = {knowledge}.node_id"

  study_sessions:
    cube: study_sessions
    type: left
    relationship: "N:1"
    sql: "{CUBE}.study_session_id = {study_sessions}.study_session_id"

  kt_recommend:
    cube: kt_recommend
    type: left
    relationship: "1:1"
    sql: "{CUBE}.recommend_id = {kt_recommend}.recommend_id"
