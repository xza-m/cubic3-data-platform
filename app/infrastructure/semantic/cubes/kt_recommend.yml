name: kt_recommend
title: KT推题记录
description: |
  KT模型自适应推题全链路：推题请求→推题过程→推题结果→答题结果。
  推题和答题存在跨天。
table: dwd_kt_rec_answer_record_flow_di

partition:
  field: ds
  type: date
  format: "yyyyMMdd"
  max_range_days: 90

dimensions:
  recommend_id:
    title: 推荐记录ID
    type: string
    sql: "{CUBE}.recommend_id"
    primary_key: true
  answer_record_id:
    title: 答题记录ID
    type: string
    sql: "{CUBE}.answer_record_id"
    foreign_key:
      cube: answer_records
      field: answer_record_id
  student_id:
    title: 学生ID
    type: string
    sql: "{CUBE}.student_id"
    foreign_key:
      cube: student
      field: user_id
  question_id:
    title: 题目ID
    type: string
    sql: "{CUBE}.question_id"
    foreign_key:
      cube: question
      field: question_id
  subject_name:
    title: 学科名称
    type: string
    sql: "{CUBE}.subject_name"
  study_type_name:
    title: 学习类型
    type: string
    sql: "{CUBE}.study_type_name"
  level_tag:
    title: 学生能力分层
    type: string
    sql: "{CUBE}.level_tag"
    enum:
      S+: 顶尖水平
      S: 优秀水平
      A: 良好水平
      B: 中等水平
      C: 待提升
  answer_result:
    title: 答题结果
    type: number
    sql: "{CUBE}.answer_result"
  question_difficulty:
    title: 题目难度
    type: number
    sql: "{CUBE}.question_difficulty"
  question_probability:
    title: KT预测值
    type: number
    sql: "{CUBE}.question_probability"
  school_name:
    title: 学校名称
    type: string
    sql: "{CUBE}.school_name"

measures:
  total_count:
    title: 推题总数
    type: count
    sql: "{CUBE}.recommend_id"
    description: KT 推题记录数量。
    certified: true
  correct_count:
    title: 正确题数
    type: sum
    sql: "CASE WHEN {CUBE}.answer_result = 1 THEN 1 ELSE 0 END"
    description: KT 推题后作答正确的题目数量。
  accuracy:
    title: 推题正确率
    type: number
    sql: "ROUND({correct_count} * 100.0 / NULLIF({total_count}, 0), 2)"
    description: KT 推题正确题数占推题总数的比例。
    format: percent
    certified: true
  avg_probability:
    title: 平均预测值
    type: avg
    sql: "{CUBE}.question_probability"
    description: KT 模型对被推荐题目的平均预测值。
  student_count:
    title: 去重学生数
    type: count_distinct
    sql: "{CUBE}.student_id"
    description: 接收 KT 推题的去重学生数量。

joins:
  student:
    cube: student
    type: left
    sql: "{CUBE}.student_id = {student}.user_id"
  question:
    cube: question
    type: left
    sql: "{CUBE}.question_id = {question}.question_id"
