[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --cov=app
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    --cov-fail-under=95
    --tb=short
    --strict-markers
filterwarnings =
    error::DeprecationWarning:app
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
asyncio_mode = auto
markers =
    redesign: Platform Redesign Round 1 新增测试（B-back-1/2/4）
