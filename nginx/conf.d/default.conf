server {
    listen 80;
    server_name localhost;
    
    # 使用变量强制nginx在运行时解析DNS，避免启动时解析失败
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream "backend:5000";

    # 前端静态资源：Vite 构建产物文件名带 hash，可长期缓存。
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    # SPA fallback：业务路由返回的是 index.html，不能缓存，否则部署后会继续引用旧 chunk。
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    # Runbook 兼容：GET /api/v1/health → 后端 /health（与 T-004a health_probe 一致；Flask 主路径为 /health）
    # Round 4 · T-DRILL 发现：变量版 proxy_pass + URI 片段不会替换 $uri，导致后端收到的是
    # /api/v1/health 而后端仅挂在 /health → 404。修复：用 rewrite 显式改写路径，再走无 URI 的
    # proxy_pass（保留 resolver 变量上游，避免 compose 重命名后整站挂掉）。
    location = /api/v1/health {
        rewrite ^ /health break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # API 代理
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        
        # 传递客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://$backend_upstream/health;
    }
    
    # API 文档端点 (OpenAPI, Swagger UI, ReDoc)
    location /api/docs/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        
        # 传递客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（用于实时更新）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置（文档生成可能需要更长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
