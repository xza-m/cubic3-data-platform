name: Docs Health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  pull_request:
    paths:
      - "README.md"
      - "AGENTS.md"
      - "frontend/README.md"
      - "docs/**/*.md"
      - "scripts/check_docs_health.py"

jobs:
  docs-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs health
        run: python scripts/check_docs_health.py --scope all
