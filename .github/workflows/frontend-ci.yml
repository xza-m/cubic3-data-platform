name: Frontend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/checks/route_parity.py"
      - "scripts/checks/bundle_budget.py"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main

jobs:
  v2-build:
    name: v2-build (tsc + vitest + vite legacy + v2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CSS token guard
        run: |
          npm run lint:css
          npm run check:v2-tokens

      # Round 4 · T-001e — i18n CI gate.
      # 只在 v2-build 跑一次，避免 3 个 job 重复扫 157 个文件。
      # 失败语义：bare > baseline 或 coverage < min 或 zh/en 字典漂移。
      - name: i18n coverage gate
        run: npm run i18n:coverage

      - name: TypeScript type check (tsc --noEmit)
        run: npx tsc --noEmit --pretty false

      - name: Vitest (unit + integration)
        run: npx vitest run --reporter=basic

      - name: Vite build · legacy
        run: npx vite build

      - name: Vite build · v2
        run: npx vite build --config v2.vite.config.ts --emptyOutDir

      - name: Upload v2 build artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-v2
          path: frontend/dist-v2
          retention-days: 7

  unit-coverage:
    name: unit-coverage (v2 components/hooks/lib ≥ 80%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vitest with coverage (gates v2 components/hooks/lib at 80%)
        run: npm run test:unit:coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-coverage-summary
          path: |
            frontend/coverage/coverage-summary.json
            frontend/coverage/lcov.info
          retention-days: 14

  size-limit:
    name: size-limit (v2 bundle budget)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: v2-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download v2 build artefact
        uses: actions/download-artifact@v4
        with:
          name: dist-v2
          path: frontend/dist-v2

      - name: Verify v2 bundle budget
        run: python scripts/checks/bundle_budget.py

  e2e-v2:
    name: e2e-v2 (Playwright P1~P22 happy paths)
    runs-on: ubuntu-latest
    needs: v2-build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e:v2
        working-directory: frontend
        env:
          VITE_AUTH_BYPASS: '1'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-v2
          path: frontend/playwright-report-v2/

  e2e-v2-a11y:
    # W5.C — axe-core scan on five key v2 pages. Gate is "0 violations of
    # severity serious/critical". Color-contrast is intentionally disabled
    # in the specs — see TODO(W5.F) for the visual baseline refresh task.
    name: e2e-v2-a11y (axe-core gate)
    runs-on: ubuntu-latest
    needs: v2-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npx playwright test --config tests/e2e-v2/playwright.config.ts --grep @a11y
        working-directory: frontend
        env:
          VITE_AUTH_BYPASS: '1'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-v2-a11y
          path: frontend/playwright-report-v2/

  route-parity-check:
    name: route-parity-check (legacy ↔ v2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run route parity guard
        run: python scripts/checks/route_parity.py --fail-on-mismatch

