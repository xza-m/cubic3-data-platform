name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/checks/backend_coverage_guard.py"
      - "scripts/backend_coverage_rules.json"
      - "requirements.txt"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main

jobs:
  backend-coverage:
    name: backend-coverage (pytest + 95% guard)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=95

      - name: Backend coverage guard (module + core)
        run: python scripts/checks/backend_coverage_guard.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          retention-days: 14
