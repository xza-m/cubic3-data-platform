# .github/workflows/lighthouse-ci-dispatch.yml
# Round 4 · D+7：Lighthouse CI 使用 repo 根 lighthouserc.json（numberOfRuns=3，median）
# 不在 PR 上默跑，以免拖长 CI；需要时在 Actions 里手动 workflow_dispatch。

name: Lighthouse CI (dispatch)

on:
  workflow_dispatch:

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: lhci (median of 3)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build v2
        run: |
          cd frontend
          npm ci
          npm run build:v2

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15.x autorun --config=lighthouserc.json
        # startServer / urls 在 lighthouserc.json；stub 无后端 — 见 _r4_stubby

      - name: Upload .lighthouseci
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-report
          path: .lighthouseci
          retention-days: 14
